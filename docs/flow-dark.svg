<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="flow-screen-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0fff8a"/>
      <stop offset="100%" stop-color="#00a05a"/>
    </linearGradient>
    <pattern id="flow-scanlines-d" x="0" y="0" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="#00000028"/>
    </pattern>
  </defs>

  <!-- machine / CRT monitor — dark theme body -->
  <rect x="14" y="22" width="190" height="76" rx="6" fill="#1a1f1c" stroke="#3a4540" stroke-width="2"/>
  <rect x="26" y="32" width="166" height="56" rx="3" fill="url(#flow-screen-d)"/>
  <rect x="26" y="32" width="166" height="56" rx="3" fill="url(#flow-scanlines-d)"/>
  <g font-size="7" fill="#001a0c" font-weight="700">
    <text x="32" y="44">$ pager start</text>
    <text x="32" y="55">tmux: claude</text>
    <text x="32" y="66">remote-control: live</text>
    <text x="32" y="77" font-size="9">▮</text>
  </g>
  <circle cx="22" cy="60" r="2" fill="#0fff8a"/>

  <!-- signal waves -->
  <g stroke="#9aa8a0" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 212 48 q 8 12 0 24"/>
    <path d="M 222 42 q 14 18 0 36"/>
    <path d="M 232 36 q 20 24 0 48"/>
  </g>

  <!-- phone -->
  <rect x="262" y="20" width="40" height="84" rx="6" fill="#1a1f1c" stroke="#3a4540" stroke-width="2"/>
  <rect x="267" y="28" width="30" height="68" rx="2" fill="url(#flow-screen-d)"/>
  <rect x="267" y="28" width="30" height="68" rx="2" fill="url(#flow-scanlines-d)"/>
  <rect x="274" y="23" width="16" height="2" rx="1" fill="#0a0a0a"/>
  <text x="282" y="66" font-size="7" fill="#001a0c" font-weight="700" text-anchor="middle">PAGER</text>
  <circle cx="282" cy="100" r="1.5" fill="#666"/>
</svg>
