name: Feature request
description: Suggest an improvement or new capability for pager.
title: "[feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation you hit. "I wanted to X but pager doesn't Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like pager to behave? CLI shape, flag, subcommand, config — sketch it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're worse.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope sanity check
      description: pager is intentionally small. Check whichever apply.
      options:
        - label: This is a small, surgical change (a flag, a subcommand variant, a log line)
        - label: This would touch the install/boot path (bootstrap, systemd, PATH)
        - label: This adds a new dependency
        - label: This is a larger redesign
